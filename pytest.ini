[pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_functions = test_*
addopts =
    --cov=agents
    --cov=modules
    --cov=search
    --cov=replay_buffers
    --cov=losses
    --cov=custom_gym_envs
    --cov-report=term-missing
    --cov-fail-under=80
markers =
    unit: Fast, isolated logic checks.
    integration: Component interaction and multi-module behavior checks.
    slow: Long-running tests (training loops, heavy rollouts, or large batched runs).
    regression: Dedicated regression checks converted from historical repro/debug scripts.
