[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py *_test.py
python_functions = test_*
addopts =
    --import-mode=importlib
    --cov=agents
    --cov=compiler
    --cov=core
    ; --cov=examples
    --cov=ops
    --cov=runtime
    --cov=validate
    --cov-report=term-missing
    --cov-fail-under=90
    --ignore=tests/performance
markers =
    unit: Fast, isolated logic checks.
    integration: Component interaction and multi-module behavior checks.
    slow: marks tests as slow (deselect with '-m "not slow"')
    regression: Dedicated regression checks converted from historical repro/debug scripts.
    performance: marks tests as throughput/efficiency benchmarks
