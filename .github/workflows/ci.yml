name: Modular RL CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job 1: Runs on every single push and PR
  fast-unit-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip' # Speeds up future runs
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .
        
    - name: Run Fast Tests
      # Runs everything EXCEPT tests marked as slow
      run: pytest -m "not slow" tests/

  # Job 2: Only runs if fast tests pass, and usually restricted to PRs
  heavy-integration-tests:
    needs: fast-unit-tests
    if: github.event_name == 'pull_request' # Saves CI minutes by only running on PRs
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
      
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip' # Speeds up future runs
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .

    - name: Run MuZero Training Loops
      # Only runs the tests marked as slow
      run: pytest -m "slow" tests/
      
    - name: Upload Graph Artifacts on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: failed-training-graphs
        # Uploads any .png files generated during the failed test
        path: ./*.png 
        retention-days: 5
  performance-benchmarks:
      needs: fast-unit-tests
      runs-on: ubuntu-latest
      steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pytest pytest-benchmark
          
      - name: Run Performance Benchmarks
        # Explicitly run the folder we ignored in pytest.ini, and output to JSON
        run: pytest tests/performance/ --benchmark-json=benchmark_results.json
        
      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v4
        with:
          name: performance-benchmarks
          path: benchmark_results.json
          retention-days: 30 # Keep a month of historical data