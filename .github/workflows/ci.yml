name: Modular RL CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job 1: Runs on every single push and PR
  fast-unit-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip' # Speeds up future runs
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .
        
    - name: Run Fast Tests
      # Runs everything EXCEPT tests marked as slow
      run: pytest -m "not slow" tests/

  # Job 2: Only runs if fast tests pass, and usually restricted to PRs
  heavy-integration-tests:
    needs: fast-unit-tests
    if: github.event_name == 'pull_request' # Saves CI minutes by only running on PRs
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
      
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip' # Speeds up future runs
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .

    - name: Run MuZero Training Loops
      # Only runs the tests marked as slow
      run: pytest -m "slow" tests/
      
    - name: Upload Graph Artifacts on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: failed-training-graphs
        # Uploads any .png files generated during the failed test
        path: ./*.png 
        retention-days: 5
  # Job 3: Automated Performance Dashboard
  performance-benchmarks:
    needs: fast-unit-tests
    runs-on: ubuntu-latest
    # Explicitly grant permissions for the token in this job
    permissions:
      contents: write
      deployments: write
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-benchmark
        
    - name: Run Performance Benchmarks
      run: pytest tests/performance/ --benchmark-json=benchmark_results.json
      
    - name: Publish to GitHub Pages Dashboard
      uses: benchmark-action/github-action-benchmark@v1
      with:
        name: Modular RL Performance
        tool: 'pytest'
        output-file-path: benchmark_results.json
        github-token: ${{ secrets.GITHUB_TOKEN }}
        # Automatically push the interactive HTML to the gh-pages branch
        auto-push: true
        # If performance drops by more than 50%, comment on the PR
        alert-threshold: '150%'
        comment-on-alert: true
        fail-on-alert: false